services:
  backend:
    image: sstcp-backend:v1.0.7
    container_name: sstcp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    environment:
      - ENVIRONMENT=production
      - DEBUG=False
      - ALIYUN_OCR_REGION_ID=cn-shanghai
      - ALIYUN_OSS_ENDPOINT=oss-cn-shanghai.aliyuncs.com
      - ALIYUN_OSS_BUCKET_NAME=sstcp-uploads
      - ALIYUN_OSS_ENABLED=true
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sstcp-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M

  frontend-pc:
    image: sstcp-frontend-pc:v1.0.7
    container_name: sstcp-frontend-pc
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - sstcp-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

  frontend-h5:
    image: sstcp-frontend-h5:v1.0.7
    container_name: sstcp-frontend-h5
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - sstcp-network
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-logs:
