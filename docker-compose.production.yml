services:
  backend:
    build:
      context: .
      dockerfile: backend-python/Dockerfile
    container_name: sstcp-backend-prod
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - backend-python/.env.production
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend-pc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sstcp-frontend-pc-prod
    restart: always
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend-h5:
    build:
      context: .
      dockerfile: H5/Dockerfile
    container_name: sstcp-frontend-h5-prod
    restart: always
    ports:
      - "8082:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine3.18
    container_name: sstcp-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-pc:
        condition: service_started
      frontend-h5:
        condition: service_started
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-logs:
