name: CD Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        default: 'v2.0.7'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            cd /opt/sstcp
            git pull origin main
            docker-compose -f docker/docker-compose-server.yml build
            docker-compose -f docker/docker-compose-server.yml run --rm backend alembic upgrade head
            docker-compose -f docker/docker-compose-server.yml down
            docker-compose -f docker/docker-compose-server.yml up -d
            docker system prune -f

      - name: Health check
        run: |
          sleep 30
          curl -f https://paidan.sstcp.top/api/v1/health || exit 1

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "::error::Production deployment failed! Check health check and server logs."
