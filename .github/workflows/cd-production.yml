name: CD Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to deploy'
        required: true
        default: 'v1.0.3'

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [pc-frontend, h5-frontend, backend, security]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push PC Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-pc:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-pc:${{ inputs.version || github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-pc:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-pc:buildcache,mode=max

      - name: Build and push H5 Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./H5/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-h5:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-h5:${{ inputs.version || github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-h5:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-frontend-h5:buildcache,mode=max

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-python
          file: ./backend-python/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/sstcp-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/sstcp-backend:${{ inputs.version || github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/sstcp-backend:buildcache,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          password: ${{ secrets.PRODUCTION_PASSWORD }}
          script: |
            cd /opt/sstcp
            docker-compose pull
            docker-compose run --rm backend alembic upgrade head
            docker-compose down
            docker-compose up -d
            docker system prune -f

      - name: Health check
        run: |
          sleep 30
          curl -f https://${{ secrets.PRODUCTION_HOST }}/api/v1/health || exit 1

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'Production deployment completed'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        if: always()
