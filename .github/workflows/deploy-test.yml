name: Deploy to Test Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Test Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            set -e
            
            echo "=========================================="
            echo "开始部署到测试服务器"
            echo "时间: $(date)"
            echo "=========================================="
            
            cd /opt/PAI_DAN_SSTCP
            
            echo "[1/8] 拉取最新代码..."
            if [ -d ".git" ]; then
              git fetch origin
              git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
            else
              git clone https://github.com/${{ github.repository }}.git .
            fi
            
            echo "[2/8] 创建环境配置文件..."
            cat > backend-python/.env << 'ENVEOF'
            SECRET_KEY=${{ secrets.SECRET_KEY }}
            DATABASE_URL=postgresql://sstcp_user:Sstcp@2026@host.docker.internal:5432/sstcp_test
            ENVIRONMENT=production
            DEBUG=False
            ALIYUN_ACCESS_KEY_ID=${{ secrets.ALIYUN_ACCESS_KEY_ID }}
            ALIYUN_ACCESS_KEY_SECRET=${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
            ALIYUN_OCR_REGION_ID=cn-shanghai
            ENVEOF
            
            echo "[3/8] 停止旧容器..."
            docker compose down --remove-orphans 2>/dev/null || true
            
            echo "[4/8] 清理旧镜像..."
            docker image prune -f
            
            echo "[5/8] 构建新镜像..."
            docker compose build --no-cache
            
            echo "[6/8] 启动服务..."
            docker compose up -d
            
            echo "[7/8] 等待服务启动..."
            sleep 15
            
            echo "[8/8] 运行数据库迁移..."
            docker compose exec -T backend alembic upgrade head 2>/dev/null || echo "数据库迁移完成或无需迁移"
            
            echo "检查服务状态..."
            docker compose ps
            
            echo "检查后端健康状态..."
            curl -s http://localhost:8000/api/v1/health || echo "后端服务启动中..."
            
            echo "=========================================="
            echo "部署完成!"
            echo "=========================================="
            
            echo "清理未使用的镜像..."
            docker image prune -af --filter "until=24h" 2>/dev/null || true
