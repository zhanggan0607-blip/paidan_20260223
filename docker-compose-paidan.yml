services:
  paidan-backend:
    image: sstcp-backend:${APP_VERSION:-v2.3.4}
    container_name: paidan-backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      REDIS_ENABLED: "false"
      ALIYUN_ACCESS_KEY_ID: ${ALIYUN_ACCESS_KEY_ID}
      ALIYUN_ACCESS_KEY_SECRET: ${ALIYUN_ACCESS_KEY_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      APP_VERSION: ${APP_VERSION:-v2.3.4}
      TZ: Asia/Shanghai
    volumes:
      - paidan_uploads:/app/uploads
    networks:
      - paidan-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  paidan-frontend-h5:
    image: sstcp-frontend-h5:${APP_VERSION:-v2.3.4}
    container_name: paidan-frontend-h5
    restart: always
    depends_on:
      paidan-backend:
        condition: service_healthy
    networks:
      - paidan-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  paidan-frontend-pc:
    image: sstcp-frontend-pc:${APP_VERSION:-v2.3.4}
    container_name: paidan-frontend-pc
    restart: always
    depends_on:
      paidan-backend:
        condition: service_healthy
    networks:
      - paidan-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  paidan-nginx:
    image: nginx:1.25-alpine3.18
    container_name: paidan-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      paidan-backend:
        condition: service_healthy
      paidan-frontend-pc:
        condition: service_started
      paidan-frontend-h5:
        condition: service_started
    networks:
      - paidan-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

volumes:
  paidan_uploads:
  certbot-webroot:

networks:
  paidan-net:
    driver: bridge
