services:
  backend:
    image: sstcp-backend:v2.0.1
    container_name: sstcp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=production
      - DEBUG=False
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET}
      - ALIYUN_OCR_REGION_ID=cn-shanghai
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      - ALIYUN_OSS_ENDPOINT=oss-cn-shanghai.aliyuncs.com
      - ALIYUN_OSS_BUCKET_NAME=sstcp-uploads
      - ALIYUN_OSS_ENABLED=true
      - CORS_ORIGINS=https://paidan.sstcp.top,https://www.paidan.sstcp.top,http://8.153.95.31,http://localhost:8000
      - SERVER_BASE_URL=https://www.paidan.sstcp.top
    volumes:
      - backend-uploads:/app/uploads
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sstcp-network

  frontend-pc:
    image: sstcp-frontend-pc:v2.0.7
    container_name: sstcp-frontend-pc
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - sstcp-network

  frontend-h5:
    image: sstcp-frontend-h5:v2.0.3
    container_name: sstcp-frontend-h5
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - sstcp-network

  nginx:
    image: nginx:1.25-alpine3.18
    container_name: sstcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-test.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend-pc
      - frontend-h5
    networks:
      - sstcp-network

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
