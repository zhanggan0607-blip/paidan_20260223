services:
  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    container_name: sstcp-backend
    restart: unless-stopped
    env_file:
      - ./backend-python/.env
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    volumes:
      - backend-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - sstcp-network

  h5-frontend:
    build:
      context: .
      dockerfile: H5/Dockerfile
    container_name: sstcp-h5
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - sstcp-network

  pc-frontend:
    build:
      context: .
      dockerfile: Dockerfile.pc
    container_name: sstcp-pc
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - sstcp-network

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
