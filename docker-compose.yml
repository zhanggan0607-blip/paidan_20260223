services:
  postgres:
    image: postgres:15-alpine
    container_name: sstcp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sstcp_test
      POSTGRES_USER: sstcp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sstcp_user -d sstcp_test"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  backend:
    build:
      context: .
      dockerfile: backend-python/Dockerfile
    image: sstcp-backend:dev
    container_name: sstcp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - DATABASE_URL=postgresql://sstcp_user:${POSTGRES_PASSWORD}@sstcp-postgres:5432/sstcp_test
      - SECRET_KEY=local-dev-secret-key-not-for-production
      - REDIS_ENABLED=false
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'

  frontend-pc:
    build:
      context: .
      dockerfile: Dockerfile
    image: sstcp-frontend-pc:dev
    container_name: sstcp-frontend-pc
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M

  frontend-h5:
    build:
      context: .
      dockerfile: H5/Dockerfile
    image: sstcp-frontend-h5:dev
    container_name: sstcp-frontend-h5
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M

  nginx:
    image: nginx:1.25-alpine3.18
    container_name: sstcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx-local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend-pc:
        condition: service_started
      frontend-h5:
        condition: service_started
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M

networks:
  sstcp-network:
    driver: bridge

volumes:
  postgres-data:
  backend-uploads:
  backend-logs:
