services:
  backend:
    image: sstcp-backend:v2.2.1
    container_name: sstcp-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_URL=${DATABASE_URL:?DATABASE_URL is required}
      - DEBUG=False
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
      - PAGE_SIZE=20
      - MAX_PAGE_SIZE=100
      - REDIS_URL=${REDIS_URL:-redis://localhost:6379/0}
      - REDIS_ENABLED=${REDIS_ENABLED:-true}
      - REDIS_CACHE_TTL=${REDIS_CACHE_TTL:-3600}
      - ALIYUN_ACCESS_KEY_ID=${ALIYUN_ACCESS_KEY_ID}
      - ALIYUN_ACCESS_KEY_SECRET=${ALIYUN_ACCESS_KEY_SECRET}
      - ALIYUN_OCR_REGION_ID=cn-shanghai
      - ALIYUN_OSS_ACCESS_KEY_ID=${ALIYUN_OSS_ACCESS_KEY_ID}
      - ALIYUN_OSS_ACCESS_KEY_SECRET=${ALIYUN_OSS_ACCESS_KEY_SECRET}
      - ALIYUN_OSS_ENDPOINT=oss-cn-shanghai.aliyuncs.com
      - ALIYUN_OSS_BUCKET_NAME=sstcp-uploads
      - ALIYUN_OSS_CDN_DOMAIN=${ALIYUN_OSS_CDN_DOMAIN}
      - ALIYUN_OSS_ENABLED=true
      - DINGTALK_AGENT_ID=${DINGTALK_AGENT_ID}
      - DINGTALK_APP_KEY=${DINGTALK_APP_KEY}
      - DINGTALK_APP_SECRET=${DINGTALK_APP_SECRET}
      - APP_VERSION=${APP_VERSION:-2.2.1}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://paidan.sstcp.top,https://www.paidan.sstcp.top}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-https://www.paidan.sstcp.top}
      - DOCS_URL=
      - REDOC_URL=
      - OPENAPI_URL=
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    dns:
      - 8.8.8.8
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

  frontend-pc:
    image: sstcp-frontend-pc:v2.2.1
    container_name: sstcp-frontend-pc
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend-h5:
    image: sstcp-frontend-h5:v2.2.1
    container_name: sstcp-frontend-h5
    restart: unless-stopped
    ports:
      - "8082:80"
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:1.25-alpine3.18
    container_name: sstcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot-webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend-pc
      - frontend-h5
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-logs:
