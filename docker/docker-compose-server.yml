services:
  backend:
    image: sstcp-backend:${APP_VERSION:-v2.3.5}
    container_name: sstcp-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
      - ENVIRONMENT=production
    volumes:
      - backend-uploads:/app/uploads
      - backend-logs:/app/logs
    dns:
      - 223.5.5.5
      - 114.114.114.114
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  frontend-pc:
    image: sstcp-frontend-pc:${APP_VERSION:-v2.3.5}
    container_name: sstcp-frontend-pc
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend-h5:
    image: sstcp-frontend-h5:${APP_VERSION:-v2.3.5}
    container_name: sstcp-frontend-h5
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine3.18
    container_name: sstcp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot
    depends_on:
      - backend
      - frontend-pc
      - frontend-h5
    networks:
      - sstcp-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://0.0.0.0:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '1.0'
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

networks:
  sstcp-network:
    driver: bridge

volumes:
  backend-uploads:
  backend-logs:
  certbot-webroot:
